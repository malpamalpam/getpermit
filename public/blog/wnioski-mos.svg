<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="rgba(255,255,255,0.02)" />
  <circle cx="150" cy="530" r="180" fill="rgba(255,255,255,0.02)" />
  <!-- Monitor/laptop shape -->
  <rect x="350" y="100" width="500" height="320" rx="15" ry="15" fill="url(#screen)" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
  <!-- Screen inner -->
  <rect x="370" y="120" width="460" height="270" rx="5" fill="rgba(0,0,0,0.15)" />
  <!-- Browser bar -->
  <rect x="370" y="120" width="460" height="35" rx="5" fill="rgba(255,255,255,0.08)" />
  <circle cx="390" cy="137" r="5" fill="rgba(255,100,100,0.4)" />
  <circle cx="408" cy="137" r="5" fill="rgba(255,200,50,0.4)" />
  <circle cx="426" cy="137" r="5" fill="rgba(100,200,100,0.4)" />
  <!-- URL bar -->
  <rect x="445" y="129" width="260" height="16" rx="8" fill="rgba(255,255,255,0.08)" />
  <text x="500" y="141" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">mos.cudzoziemcy.gov.pl</text>
  <!-- Form fields on screen -->
  <rect x="400" y="175" width="200" height="14" rx="3" fill="rgba(255,255,255,0.12)" />
  <rect x="400" y="200" width="400" height="25" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <rect x="400" y="240" width="200" height="14" rx="3" fill="rgba(255,255,255,0.12)" />
  <rect x="400" y="265" width="400" height="25" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <rect x="400" y="305" width="200" height="14" rx="3" fill="rgba(255,255,255,0.12)" />
  <rect x="400" y="330" width="400" height="25" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <!-- Submit button -->
  <rect x="620" y="370" width="180" height="35" rx="6" fill="rgba(37,99,235,0.5)" stroke="rgba(59,130,246,0.5)" stroke-width="1" />
  <text x="710" y="392" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)" font-weight="600">Zloz wniosek</text>
  <!-- Laptop base -->
  <rect x="300" y="420" width="600" height="15" rx="3" fill="rgba(255,255,255,0.08)" />
  <rect x="450" y="435" width="300" height="5" rx="2" fill="rgba(255,255,255,0.05)" />
  <!-- Cloud/upload icon -->
  <g transform="translate(200,250)">
    <path d="M0,30 C0,10 15,-5 35,0 C45,-15 75,-15 85,0 C105,-5 120,10 120,30 C120,50 105,55 90,55 L30,55 C15,55 0,50 0,30 Z" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" />
    <line x1="60" y1="20" x2="60" y2="45" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round" />
    <polyline points="48,32 60,20 72,32" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <!-- Document icon -->
  <g transform="translate(950,200)">
    <rect x="0" y="0" width="60" height="80" rx="5" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" />
    <path d="M40,0 L60,20" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" />
    <rect x="10" y="30" width="40" height="5" rx="2" fill="rgba(255,255,255,0.1)" />
    <rect x="10" y="42" width="30" height="5" rx="2" fill="rgba(255,255,255,0.08)" />
    <rect x="10" y="54" width="35" height="5" rx="2" fill="rgba(255,255,255,0.08)" />
  </g>
  <!-- Title -->
  <text x="600" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white" letter-spacing="0.5">Wnioski Online MOS</text>
  <text x="600" y="555" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.7)">System elektroniczny 2026 | getpermit.pl</text>
  <!-- Accent bar -->
  <rect x="0" y="620" width="400" height="10" fill="rgba(124,58,237,0.3)" />
  <rect x="400" y="620" width="400" height="10" fill="rgba(37,99,235,0.3)" />
  <rect x="800" y="620" width="400" height="10" fill="rgba(14,165,233,0.3)" />
</svg>