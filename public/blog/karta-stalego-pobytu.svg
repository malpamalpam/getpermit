<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#155e75;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.4" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Decorative shapes -->
  <circle cx="1100" cy="80" r="250" fill="rgba(255,255,255,0.02)" />
  <circle cx="100" cy="550" r="180" fill="rgba(255,255,255,0.02)" />
  <circle cx="900" cy="500" r="120" fill="rgba(255,255,255,0.015)" />
  <!-- Card shape -->
  <rect x="350" y="120" width="440" height="280" rx="20" ry="20" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
  <!-- Card chip -->
  <rect x="390" y="170" width="60" height="45" rx="8" ry="8" fill="rgba(255,215,0,0.4)" stroke="rgba(255,215,0,0.6)" stroke-width="1.5" />
  <line x1="390" y1="190" x2="450" y2="190" stroke="rgba(255,215,0,0.5)" stroke-width="1" />
  <line x1="420" y1="170" x2="420" y2="215" stroke="rgba(255,215,0,0.5)" stroke-width="1" />
  <!-- Card lines -->
  <rect x="390" y="240" width="200" height="12" rx="6" fill="rgba(255,255,255,0.25)" />
  <rect x="390" y="270" width="140" height="10" rx="5" fill="rgba(255,255,255,0.15)" />
  <rect x="390" y="295" width="260" height="10" rx="5" fill="rgba(255,255,255,0.15)" />
  <rect x="390" y="320" width="180" height="10" rx="5" fill="rgba(255,255,255,0.15)" />
  <!-- Photo placeholder -->
  <rect x="670" y="170" width="80" height="100" rx="5" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
  <!-- Infinity symbol (permanent) -->
  <path d="M690 310 C690 290, 720 280, 730 300 C740 320, 770 310, 770 290 C770 270, 740 280, 730 300 C720 320, 690 330, 690 310 Z" fill="none" stroke="rgba(52,211,153,0.5)" stroke-width="2.5" />
  <!-- Shield icon (security/permanent) -->
  <path d="M840 180 L840 250 C840 290, 810 320, 870 340 C930 320, 900 290, 900 250 L900 180 L870 165 Z" fill="url(#shield)" stroke="rgba(52,211,153,0.4)" stroke-width="1.5" />
  <!-- Checkmark in shield -->
  <polyline points="855,255 868,270 890,240" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Title text -->
  <text x="600" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white" letter-spacing="0.5">Karta Stalego Pobytu</text>
  <text x="600" y="525" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.7)">Pobyt staly w Polsce | getpermit.pl</text>
  <!-- Polish flag stripe accent -->
  <rect x="0" y="620" width="600" height="10" fill="rgba(255,255,255,0.3)" />
  <rect x="600" y="620" width="600" height="10" fill="rgba(220,38,38,0.4)" />
</svg>