<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#065f46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.15" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="220" fill="rgba(255,255,255,0.02)" />
  <circle cx="150" cy="530" r="160" fill="rgba(255,255,255,0.02)" />
  <!-- Large coin -->
  <circle cx="600" cy="260" r="130" fill="url(#coin)" stroke="rgba(251,191,36,0.3)" stroke-width="3" />
  <circle cx="600" cy="260" r="110" fill="none" stroke="rgba(251,191,36,0.2)" stroke-width="1.5" />
  <!-- PLN text on coin -->
  <text x="600" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="60" font-weight="700" fill="rgba(251,191,36,0.5)">PLN</text>
  <text x="600" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="rgba(251,191,36,0.35)">2026</text>
  <!-- Stacked coins left -->
  <ellipse cx="250" cy="320" rx="60" ry="15" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.15)" stroke-width="1" />
  <ellipse cx="250" cy="305" rx="60" ry="15" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.15)" stroke-width="1" />
  <ellipse cx="250" cy="290" rx="60" ry="15" fill="rgba(251,191,36,0.14)" stroke="rgba(251,191,36,0.18)" stroke-width="1" />
  <ellipse cx="250" cy="275" rx="60" ry="15" fill="rgba(251,191,36,0.16)" stroke="rgba(251,191,36,0.2)" stroke-width="1" />
  <!-- Stacked coins right -->
  <ellipse cx="950" cy="340" rx="55" ry="14" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.12)" stroke-width="1" />
  <ellipse cx="950" cy="325" rx="55" ry="14" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.14)" stroke-width="1" />
  <ellipse cx="950" cy="310" rx="55" ry="14" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.16)" stroke-width="1" />
  <!-- Price tag -->
  <g transform="translate(870,160)">
    <rect x="0" y="0" width="100" height="60" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" />
    <text x="50" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">od</text>
    <text x="50" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.6)">340 zl</text>
  </g>
  <!-- Calculator icon -->
  <g transform="translate(180,160)">
    <rect x="0" y="0" width="70" height="90" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" />
    <rect x="10" y="10" width="50" height="20" rx="3" fill="rgba(255,255,255,0.08)" />
    <circle cx="20" cy="45" r="5" fill="rgba(255,255,255,0.08)" />
    <circle cx="35" cy="45" r="5" fill="rgba(255,255,255,0.08)" />
    <circle cx="50" cy="45" r="5" fill="rgba(255,255,255,0.08)" />
    <circle cx="20" cy="62" r="5" fill="rgba(255,255,255,0.08)" />
    <circle cx="35" cy="62" r="5" fill="rgba(255,255,255,0.08)" />
    <circle cx="50" cy="62" r="5" fill="rgba(255,255,255,0.08)" />
    <circle cx="20" cy="79" r="5" fill="rgba(255,255,255,0.08)" />
    <circle cx="35" cy="79" r="5" fill="rgba(255,255,255,0.08)" />
    <circle cx="50" cy="79" r="5" fill="rgba(255,255,255,0.08)" />
  </g>
  <!-- Checklist icon -->
  <g transform="translate(380,140)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="none" stroke="rgba(52,211,153,0.4)" stroke-width="1.5" />
    <polyline points="2,6 5,9 10,3" fill="none" stroke="rgba(52,211,153,0.4)" stroke-width="1.5" />
    <rect x="18" y="3" width="50" height="6" rx="3" fill="rgba(255,255,255,0.1)" />
  </g>
  <g transform="translate(380,165)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="none" stroke="rgba(52,211,153,0.4)" stroke-width="1.5" />
    <polyline points="2,6 5,9 10,3" fill="none" stroke="rgba(52,211,153,0.4)" stroke-width="1.5" />
    <rect x="18" y="3" width="40" height="6" rx="3" fill="rgba(255,255,255,0.1)" />
  </g>
  <g transform="translate(380,190)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="none" stroke="rgba(251,191,36,0.3)" stroke-width="1.5" />
    <rect x="18" y="3" width="45" height="6" rx="3" fill="rgba(255,255,255,0.08)" />
  </g>
  <!-- Title -->
  <text x="600" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white" letter-spacing="0.5">Ile Kosztuje Karta Pobytu?</text>
  <text x="600" y="515" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.7)">Cennik 2026 | getpermit.pl</text>
  <!-- Green accent bar -->
  <rect x="0" y="620" width="600" height="10" fill="rgba(4,120,87,0.4)" />
  <rect x="600" y="620" width="600" height="10" fill="rgba(251,191,36,0.25)" />
</svg>